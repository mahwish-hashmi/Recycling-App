# --- 1. Security & Identity ---
jwt.secret=secret
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- 2. Database Connection ---
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=mysql
spring.datasource.password=password

# --- 3. Hibernate & Schema ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL57Dialect

# --- 4. Data Initialization (The Fix for the Empty DB) ---
# This forces Spring to run data.sql after Hibernate creates the tables
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.data-locations=classpath:data.sql

# --- 5. Web & Networking ---
server.port=8080
server.servlet.context-path=/api

# --- 6. Debugging (Optional but helpful) ---
spring.jackson.serialization.fail-on-empty-beans=false
spring.jpa.show-sql=true


