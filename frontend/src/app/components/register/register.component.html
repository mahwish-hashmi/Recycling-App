<!-- ============================================================
     register.component.html
     ============================================================ -->

<div class="auth-page">

  <!-- Left panel -->
  <div class="auth-panel anim-fade-in">
    <div class="auth-panel__content">
      <div class="auth-panel__logo">
        <i class="fa-solid fa-leaf"></i>
      </div>
      <h2 class="auth-panel__title">Join the green revolution</h2>
      <p class="auth-panel__sub">Create your free account and start buying and selling eco-friendly products today.</p>
      <div class="auth-panel__features">
        <div class="auth-panel__feat">
          <i class="fa-solid fa-bolt"></i>
          <span>Set up in under 2 minutes</span>
        </div>
        <div class="auth-panel__feat">
          <i class="fa-solid fa-store"></i>
          <span>Access the full marketplace</span>
        </div>
        <div class="auth-panel__feat">
          <i class="fa-solid fa-earth-americas"></i>
          <span>Make a real difference</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Form side -->
  <div class="auth-form-side anim-scale-in">
    <div class="auth-card auth-card--wide">
      <div class="auth-card__header">
        <h1 class="auth-card__title">Create account</h1>
        <p class="auth-card__sub">
          Already a member? <a routerLink="/login" class="auth-link">Sign in</a>
        </p>
      </div>

      <form class="auth-form" (submit)="register()">

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <div class="input-wrap">
              <i class="fa-regular fa-user input-icon"></i>
              <input class="form-control form-control--icon" type="text" id="username"
                placeholder="eco_shopper" name="username" [(ngModel)]="username" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="name">Full name</label>
            <div class="input-wrap">
              <i class="fa-regular fa-id-card input-icon"></i>
              <input class="form-control form-control--icon" type="text" id="name"
                placeholder="Jane Smith" name="name" [(ngModel)]="name" />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <div class="input-wrap">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input class="form-control form-control--icon" type="text" id="email"
              placeholder="you@example.com" name="email" [(ngModel)]="email" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock input-icon"></i>
              <input class="form-control form-control--icon" type="password" id="password"
                placeholder="••••••••" name="password" [(ngModel)]="password" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm password</label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock input-icon"></i>
              <input class="form-control form-control--icon" type="password" id="confirmPassword"
                placeholder="••••••••" name="confirmPassword" [(ngModel)]="passwordConfirm" />
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label class="form-label" for="address">Address</label>
            <div class="input-wrap">
              <i class="fa-solid fa-location-dot input-icon"></i>
              <input class="form-control form-control--icon" type="text" id="address"
                placeholder="123 Green Street, City" name="address" [(ngModel)]="address" />
            </div>
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label" for="phone">Phone</label>
            <div class="input-wrap">
              <i class="fa-solid fa-phone input-icon"></i>
              <input class="form-control form-control--icon" type="text" id="phone"
                placeholder="+1 555 0000" name="phone" [(ngModel)]="phone" />
            </div>
          </div>
        </div>

        <div class="alert-error" *ngIf="error">
          <i class="fa-solid fa-circle-exclamation"></i>
          {{ error }}
        </div>

        <button type="submit" class="btn btn-primary btn-lg auth-submit">
          Create my account <i class="fa-solid fa-arrow-right"></i>
        </button>

      </form>
    </div>
  </div>

</div>
